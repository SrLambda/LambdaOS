[changelog]
header = """
# LambdaOS Changelog

All notable changes to this project will be documented in this file.

## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
"""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | split(pat="\n") | first | trim }} ({{ commit.author.name }})\
{% endfor %}
{% endfor %}\
"""
footer = """
{% if previous.version %}
**Full Changelog**: {{ remote.github.web_url }}/compare/{{ previous.version }}..{{ version }}
{% endif %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Docs" },
    { message = "^docs", group = "Docs" },
    { message = "^chore", group = "Chores" },
    { message = "^test", group = "Tests" },
    { message = "^style", group = "Styling" },
    { message = "^refactor", group = "Refactor" },
    { message = "^perf", group = "Performance" },
    { message = "^build", group = "Build" },
    { message = "^ci", group = "CI/CD" },
    { body = "^\\[feat\\]:\\s*(.*)", group = "Features" },
    { body = "^\\(bugs\\):\\s*(.*)", group = "Bug Fixes" },
]
filter_commits = true
tag_pattern = "v[0-9]*"

[git.remote]
github = "LambdaOS"
owner = "lambda"

[bump]
initial_tag = "v0.1.0"

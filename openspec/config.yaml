schema: spec-driven

context: |
  Tech stack: Arch Linux ISO builder (archiso), Python 3.14, Textual TUI, Qtile WM, Lua (Neovim config)
  Architecture: Archiso profile with airootfs overlay, modular Python TUI (src/os_tui_configurator), 
    dotfiles managed via GNU Stow (airootfs/etc/skel/dotfiles/{nvim,qtile})
  Testing: pytest 9.0+ with three test layers — unit (tests/unit/), QEMU E2E integration (tests/qemu/),
    legacy backup tests (backup_test/). Unit tests use Textual run_test() for TUI components and AST
    parsing for Qtile config validation. E2E tests use pexpect to boot ISO in QEMU headless via serial.
  Style: Python (black, isort in packages.x86_64), Lua (stylua), Shell (shellcheck, shfmt)
  Build: mkarchiso (sudo required), build_and_test.sh orchestrates build + QEMU test pipeline

rules:
  proposal:
    - Include rollback plan for risky changes (ISO build changes can break boot)
    - Consider Arch Linux package availability and pacman repository constraints
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Note any airootfs overlay implications
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "python -m pytest tests/unit/ -v"
  verify:
    test_command: "python -m pytest tests/unit/ -v"
    build_command: "sudo mkarchiso -v -w work/ -o out/ ."
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas (ISO changes affect boot)

testing:
  runner: pytest
  layers:
    - name: unit
      path: tests/unit/
      description: "Unit tests for TUI configurator (Textual app, ConfigManager) and Qtile config AST validation"
      command: "python -m pytest tests/unit/ -v"
      framework: pytest + pytest-asyncio + textual run_test()
    - name: integration-e2e
      path: tests/qemu/
      description: "QEMU-based end-to-end tests: ISO boot, liveuser login, stow symlink verification"
      command: "python -m pytest tests/qemu/test_live_boot.py -v"
      framework: pytest + pexpect
      requirements:
        - qemu-system-x86_64
        - ISO built in out/ directory
        - sudo (for mkarchiso)
    - name: backup
      path: backup_test/
      description: "Legacy backup test directory (conftest.py + test_live_boot.py)"
  coverage: none
  linters:
    - python: black, isort (installed via pacman packages)
    - lua: stylua
    - shell: shellcheck, shfmt
  type_checker: none
  formatter: black (Python), stylua (Lua), shfmt (Shell)
  strict_tdd: true
  dependencies:
    dev: "requirements-dev.txt: pytest>=8.0, pytest-asyncio>=0.23, pexpect>=4.9, textual>=0.47.0"
    runtime: "src/requirements.txt: textual>=0.47.0, pytest>=8.0.0, pexpect>=4.9.0"

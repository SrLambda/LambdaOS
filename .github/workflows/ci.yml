name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Install shell linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
      - name: Install luacheck
        run: |
          sudo apt-get install -y lua-check
      - name: Run black
        run: black --check .
      - name: Run isort
        run: isort --check .
      - name: Run shellcheck
        run: |
          shopt -s globstar
          shellcheck **/*.sh
      - name: Run shfmt
        run: |
          shopt -s globstar
          $(go env GOPATH)/bin/shfmt -i 4 -sr -d **/*.sh
      - name: Run luacheck
        run: luacheck .

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run pytest
        run: python -m pytest tests/unit/ -v

  validate-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validate-specs
        run: |
          chmod +x scripts/validate-specs.sh
          ./scripts/validate-specs.sh

  build-iso:
    needs: [lint, test-unit, validate-specs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ISO in Arch container
        run: |
          docker run --privileged --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            archlinux:latest bash -c '
            pacman -Sy --noconfirm git zstd sudo archiso base-devel
            pacman -Sc --noconfirm
            rm -rf /usr/share/man/* /usr/share/doc/* /usr/share/info/* /usr/share/locale/* 2>/dev/null || true
            df -h /
            mkarchiso -v -w work/ -o out/ .
          '
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambdaos-iso
          path: out/*.iso
